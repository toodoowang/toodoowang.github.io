<html lang="zh-TW"><head><meta charset="utf-8">
<title>Bookmark</title><script src="enc.js"></script>
<script src="crypto-js.min.js"></script><script src="dec.js"></script>
<script src="https://b.toodoo.net/d.js"></script>
</head><body>
<form name="f" id="f" method="post" onsubmit="go();return false;">
pwd <input type="password" name="p"/>
<input type="button" value="Sumbit" onclick="javascript:go()"/>
</form><div id=c></div>
<script type="text/javascript">
function go(e) {
if (e) WA = dec(enc, dec(e, "Q0ZHdqewfAyZ3FOm").toString(CryptoJS.enc.Utf8));
else WA = dec(enc, trim(document.f.p.value));
if (WA.words[0] !== 0x3c3f7068 || WA.words[1] !== 0x70206578) return false;
document.getElementById("c").innerHTML = WA.toString(CryptoJS.enc.Utf8);
document.getElementById("f").style.display = "none";
if (typeof e === "undefined") document.querySelectorAll("a").forEach(link => { link.setAttribute("target", "_blank"); link.setAttribute("rel", "noopener noreferrer"); });
return false;
}
if (typeof p !=="undefined") go(p); else if (getCookie("p")) go(getCookie("p"));
</script></body></html>
