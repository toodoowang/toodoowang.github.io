<html lang="zh-TW"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>not</title><script src="https://b.toodoo.net/not.js"></script>
</head><body>
<div id="f">pwd <input type="password" id="pwd" />
<button id="s">Submit</button></div><div id=c></div>
<script>
async function dec(enc, password, iterations = 10000) {
    const data = Uint8Array.from(atob(enc), c => c.charCodeAt(0));
    if (new TextDecoder().decode(data.subarray(0, 6)) !== "Salted") throw new Error("Missing header.");
    const salt = data.subarray(8, 16), ctext = data.subarray(16);
    const keym = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveBits"]);
    const div = new Uint8Array(await crypto.subtle.deriveBits({ name: "PBKDF2", salt, iterations, hash: "SHA-256" }, keym, 384));
    const key = await crypto.subtle.importKey("raw", div.subarray(0, 32), "AES-CBC", false, ["decrypt"]);
    const decrypt = await crypto.subtle.decrypt({ name: "AES-CBC", iv: div.subarray(32, 48) }, key, ctext);
    return new TextDecoder().decode(decrypt);
}

async function go() {
try {
    document.getElementById("c").innerHTML = await dec(enc, document.getElementById('pwd').value);
    document.getElementById("f").style.display = "none";
} catch (err) { //console.error("decode error");
}
}

document.getElementById('s').addEventListener('click', go);
document.getElementById('pwd').addEventListener('keydown', (event) => { if (event.key === 'Enter') go(); });

</script></body></html>
